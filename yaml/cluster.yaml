# eksctl 클러스터 구성 파일 (EKS MLOps 워크숍용)
# 사용: eksctl create cluster -f cluster.yaml
#
# 이 구성은 워크숍 전체 파이프라인(수집→분석→전처리→학습→튜닝→서빙)을
# EKS 위에서 실행하기 위한 기반 클러스터를 정의한다.
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: airflow-mlops
  region: ap-northeast-2
  version: "1.30"

# IRSA(서비스 계정에 IAM 역할 매핑)를 위한 OIDC 공급자 활성화.
# Airflow 워커 Pod의 S3/ECR 접근에 필요하다.
iam:
  withOIDC: true

# ---------------------------------------------------------------------------
# 관리형 노드 그룹
# ---------------------------------------------------------------------------
managedNodeGroups:
  # 일반 워크로드용 CPU 노드 그룹 (Airflow 구성요소, 수집/전처리/분석 태스크)
  - name: workers
    instanceType: m5.xlarge      # 4 vCPU / 16 GiB
    desiredCapacity: 3
    minSize: 2
    maxSize: 5
    volumeSize: 50               # GiB (gp3)
    volumeType: gp3
    labels:
      workload: general
    iam:
      withAddonPolicies:
        ebs: true                # EBS CSI (PVC용)
        cloudWatch: true
        imageBuilder: true       # ECR pull/push

  # 모델 학습/튜닝용 GPU 노드 그룹.
  # 비용 절감을 위해 desiredCapacity=0으로 두고, 학습 태스크가 스케줄될 때만
  # Cluster Autoscaler가 노드를 띄우도록 한다.
  - name: gpu-workers
    instanceType: g4dn.xlarge    # 1x NVIDIA T4 GPU
    desiredCapacity: 0
    minSize: 0
    maxSize: 2
    volumeSize: 100
    volumeType: gp3
    labels:
      workload: gpu
      nvidia.com/gpu: "true"
    # GPU 노드를 전용으로 격리 (일반 Pod가 스케줄되지 않도록 taint)
    taints:
      - key: nvidia.com/gpu
        value: "true"
        effect: NoSchedule
    iam:
      withAddonPolicies:
        ebs: true
        cloudWatch: true
        imageBuilder: true

# CloudWatch로 컨트롤 플레인 로그 수집 (문제 해결용)
cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator"]
