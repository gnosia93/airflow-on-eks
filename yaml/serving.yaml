# Wine Quality 추론 엔드포인트 - EKS Deployment + Service.
# apply 전에 아래 placeholder를 실제 값으로 치환한다:
#   __IMAGE__       : ECR 추론 이미지 URI (wine-serving:latest)
#   __S3_BUCKET__   : 모델/스케일러가 저장된 버킷
#   __MODEL_DATE__  : 로드할 모델 파티션 일자 (YYYY-MM-DD)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wine-serving
  namespace: airflow
  labels:
    app: wine-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wine-serving
  template:
    metadata:
      labels:
        app: wine-serving
    spec:
      # S3 접근을 위해 IRSA가 매핑된 서비스 계정 사용 (airflow 랩에서 생성)
      serviceAccountName: airflow-worker
      containers:
        - name: serving
          image: __IMAGE__
          ports:
            - containerPort: 8000
          env:
            - name: S3_BUCKET
              value: "__S3_BUCKET__"
            - name: S3_PREFIX
              value: "wine-quality"
            - name: MODEL_DATE
              value: "__MODEL_DATE__"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          # 모델 로드 완료 후에만 트래픽을 받도록 프로브 구성
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: wine-serving
  namespace: airflow
  labels:
    app: wine-serving
spec:
  type: LoadBalancer          # 실습용. 운영은 Ingress(ALB) 권장
  selector:
    app: wine-serving
  ports:
    - name: http
      port: 80
      targetPort: 8000
